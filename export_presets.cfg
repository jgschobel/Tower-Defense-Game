[preset.0.options]

custom_template/debug=""
custom_template/release=""
variant/extensions_support=false
vram_texture_compression/for_desktop=true
vram_texture_compression/for_mobile=false
html/export_icon=true
html/custom_html_shell=""
html/head_include="<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover\" />
<meta name=\"mobile-web-app-capable\" content=\"yes\" />
<meta name=\"apple-mobile-web-app-capable\" content=\"yes\" />
<style>html,body{margin:0;padding:0;overflow:hidden;background:#000;height:100%;width:100%;}canvas{display:block;}#fsHint{position:fixed;top:8px;right:8px;z-index:9999;padding:10px 14px;background:rgba(0,0,0,0.75);color:#fff;border:1px solid #888;border-radius:8px;font-family:sans-serif;font-size:14px;cursor:pointer;}</style>
<script>
  (function(){
    function goFullscreen(){
      var el = document.documentElement;
      var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
      if (req) { req.call(el).catch(function(){}); }
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(function(){});
      }
    }
    function showHint(){
      if (document.getElementById('fsHint')) return;
      var hint = document.createElement('button');
      hint.id = 'fsHint';
      hint.textContent = '⛶ Vollbild';
      hint.onclick = function(e){ e.preventDefault(); goFullscreen(); hint.remove(); };
      document.body && document.body.appendChild(hint);
    }
    // First user interaction anywhere: request fullscreen + landscape
    function firstTap(){
      goFullscreen();
      document.removeEventListener('click', firstTap, true);
      document.removeEventListener('touchstart', firstTap, true);
    }
    document.addEventListener('click', firstTap, true);
    document.addEventListener('touchstart', firstTap, true);
    // Re-show hint if user exits fullscreen mid-game
    document.addEventListener('fullscreenchange', function(){
      if (!document.fullscreenElement) { showHint(); }
      else { var h = document.getElementById('fsHint'); if (h) h.remove(); }
    });
    window.addEventListener('load', showHint);
  })();
</script>"
html/canvas_resize_policy=2
html/focus_canvas_on_start=true
html/experimental_virtual_keyboard=false
progressive_web_app/enabled=true

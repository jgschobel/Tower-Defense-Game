name: Photo Trigger File

# Bypass for the broken issue_comment trigger. Chat-session Claude can
# commit a file at .github/photo_triggers/<issue_number>.txt containing
# just the issue number. This workflow fires on push, reads each trigger
# file, processes the referenced issue's photo via Stability / Gemini,
# commits the result, opens a PR, and deletes the trigger file.
#
# Works because push-to-main events are the most reliable workflow
# triggers — unlike issue_comment which has been firing but silently
# rejecting the job's if-condition.

on:
  push:
    branches: [main]
    paths:
      - '.github/photo_triggers/**'

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: photo-trigger
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Process each trigger file
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          mkdir -p .github/photo_triggers
          PROCESSED=0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          for f in .github/photo_triggers/*.txt; do
            [ ! -f "$f" ] && continue
            ISSUE_NUM=$(cat "$f" | tr -d '[:space:]')
            if [ -z "$ISSUE_NUM" ]; then
              ISSUE_NUM=$(basename "$f" .txt)
            fi
            echo "== Processing issue #$ISSUE_NUM =="

            # Fetch issue body via gh api
            BODY=$(gh issue view "$ISSUE_NUM" --repo "${{ github.repository }}" --json body -q '.body')
            echo "Body length: ${#BODY}"

            # Run the python script with the body passed in as env
            export ISSUE_BODY="$BODY"
            export ISSUE_NUMBER="$ISSUE_NUM"
            python3 .github/scripts/photo_to_character.py || {
              REASON=""
              [ -f /tmp/photo_reason.txt ] && REASON=$(cat /tmp/photo_reason.txt)
              gh issue comment "$ISSUE_NUM" --body "⚠️ Trigger-file workflow tried to generate icon but failed. Reason: $REASON. Log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              rm -f "$f"
              continue
            }

            ASSET=$(ls assets/textures/towers/*.png | head -1)
            if [ -n "$ASSET" ] && git diff --name-only | grep -q 'assets/textures/towers'; then
              PROCESSED=$((PROCESSED + 1))
              # Stage the new/changed asset + delete the trigger
              git add assets/textures/towers/
              rm -f "$f"
              git add -u .github/photo_triggers/
              # Comment success on the issue
              gh issue comment "$ISSUE_NUM" --body "✅ Icon generated via trigger-file workflow. Committed in run ${{ github.run_id }}."
            fi
          done

          if [ "$PROCESSED" -gt 0 ]; then
            git commit -m "art(character): process $PROCESSED photo trigger(s)" || echo "nothing to commit"
            git push origin main || echo "push failed"
          else
            echo "No icons generated this run."
          fi

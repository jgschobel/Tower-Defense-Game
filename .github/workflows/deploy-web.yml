name: Deploy Web Build to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/observability/**'
      - 'CHANGELOG.md'
      - 'ROADMAP.md'
      - 'docs/audits/**'
      - '.github/friend_photos_inbox/README.md'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pick Godot version (single source of truth)
        id: godot
        run: |
          set -e
          # SoT: .github/godot-version.txt. Bump that one file when you
          # want to migrate. deploy-web AND playtest read the same value
          # so they're never on different engines.
          PINNED=$(cat .github/godot-version.txt | tr -d '[:space:]')
          if [ -z "$PINNED" ]; then
            echo "ERROR: .github/godot-version.txt is empty"; exit 1
          fi
          if curl -fsSL --head "https://github.com/godotengine/godot/releases/download/${PINNED}/Godot_v${PINNED}_linux.x86_64.zip" > /dev/null 2>&1; then
            TAG="$PINNED"
          else
            echo "ERROR: pinned Godot version $PINNED not downloadable. Update .github/godot-version.txt." >&2
            exit 1
          fi
          echo "Using Godot tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install Godot headless + export templates
        env:
          GODOT_TAG: ${{ steps.godot.outputs.tag }}
        run: |
          set -e
          echo "Installing Godot ${GODOT_TAG}"
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_TAG}"

          # Godot binary (-f makes curl fail on 404 instead of saving HTML)
          curl -fsSL -o godot.zip "${BASE}/Godot_v${GODOT_TAG}_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${GODOT_TAG}_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          godot --version

          # Export templates — Godot expects the folder name with DOT
          # separator (e.g. "4.6.2.stable") not the tag's DASH form
          # ("4.6.2-stable"). This is a long-standing Godot quirk.
          curl -fsSL -o templates.tpz "${BASE}/Godot_v${GODOT_TAG}_export_templates.tpz"
          VER_DIR="$(echo "${GODOT_TAG}" | sed 's/-/./g')"
          echo "Installing templates to ~/.local/share/godot/export_templates/${VER_DIR}/"
          mkdir -p "$HOME/.local/share/godot/export_templates/${VER_DIR}"
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$HOME/.local/share/godot/export_templates/${VER_DIR}/"
          echo "Export templates installed:"
          ls "$HOME/.local/share/godot/export_templates/${VER_DIR}/" | head -10

      - name: Import project resources (two passes)
        run: |
          set +e
          mkdir -p build/web
          timeout 180 godot --headless --path . --import
          timeout 60  godot --headless --path . --import
          exit 0

      - name: Export Web build
        run: |
          set -e
          godot --headless --path . --export-release "Web" build/web/index.html
          ls -la build/web/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

      - uses: actions/checkout@v4
        if: always()

      - name: Commit observability artifact
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          mkdir -p docs/observability
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          STATUS="ok"
          if [ -z "${{ steps.deployment.outputs.page_url }}" ]; then STATUS="fail"; fi
          {
            echo "# Deploy Latest"
            echo ""
            echo "Run: ${{ github.run_id }} @ $TS · Status: **$STATUS**"
            echo ""
            echo "URL: ${{ steps.deployment.outputs.page_url }}"
            echo ""
            echo "Commit: ${{ github.sha }}"
            echo ""
            echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > docs/observability/deploy_latest.md
          echo "- $TS · deploy-web · $STATUS · run=${{ github.run_id }} · sha=${GITHUB_SHA:0:7}" >> docs/observability/ledger.md
          tail -n 150 docs/observability/ledger.md > /tmp/ledger.trim
          mv /tmp/ledger.trim docs/observability/ledger.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase || true
          git add docs/observability/
          git commit -m "chore(observability): deploy run ${{ github.run_id }} ($STATUS)" || echo "no changes"
          git push origin main || echo "push failed — non-fatal"

name: Deploy Web Build to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6.0
  GODOT_VERSION_TYPE: stable

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Godot + export templates (manual, version-exact)
        run: |
          set -e
          GODOT_VER="${GODOT_VERSION}-${GODOT_VERSION_TYPE}"
          echo "Installing Godot ${GODOT_VER}"

          # Download Godot headless binary
          curl -sSL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_VERSION_TYPE}/Godot_v${GODOT_VERSION}-${GODOT_VERSION_TYPE}_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${GODOT_VERSION}-${GODOT_VERSION_TYPE}_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          godot --version

          # Download matching export templates
          curl -sSL -o templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_VERSION_TYPE}/Godot_v${GODOT_VERSION}-${GODOT_VERSION_TYPE}_export_templates.tpz"
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VER}"
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VER}/"
          ls "$HOME/.local/share/godot/export_templates/${GODOT_VER}/" | head -5

      - name: Import project resources (first pass)
        run: |
          mkdir -p build/web
          # Godot 4 import: open the project, import, then exit via timeout
          timeout 180 godot --headless --path . --import || true
          # Second pass in case first pass had to generate some .import files
          timeout 60 godot --headless --path . --import || true

      - name: Export Web build
        run: |
          set -e
          godot --headless --path . --export-release "Web" build/web/index.html
          ls -la build/web/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

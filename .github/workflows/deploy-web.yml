name: Deploy Web Build to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pick a real released Godot version
        id: godot
        run: |
          set -e
          # Godot tags are formatted like "4.3-stable", "4.4-stable", "4.6-stable"
          # — NOT "4.6.0-stable". Ask the GitHub API for the latest stable
          # release tag so we never download a 404 page.
          TAG=$(curl -fsSL https://api.github.com/repos/godotengine/godot/releases \
            | jq -r '[.[] | select(.prerelease == false) | .tag_name] | map(select(endswith("-stable"))) | first')
          if [ -z "$TAG" ] || [ "$TAG" = "null" ]; then
            # Fallback to a known-released version
            TAG="4.3-stable"
          fi
          echo "Using Godot tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install Godot headless + export templates
        env:
          GODOT_TAG: ${{ steps.godot.outputs.tag }}
        run: |
          set -e
          echo "Installing Godot ${GODOT_TAG}"
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_TAG}"

          # Godot binary (-f makes curl fail on 404 instead of saving HTML)
          curl -fsSL -o godot.zip "${BASE}/Godot_v${GODOT_TAG}_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${GODOT_TAG}_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          godot --version

          # Export templates — installed under ~/.local/share/godot/export_templates/<version>/
          curl -fsSL -o templates.tpz "${BASE}/Godot_v${GODOT_TAG}_export_templates.tpz"
          VER_DIR="${GODOT_TAG}"
          mkdir -p "$HOME/.local/share/godot/export_templates/${VER_DIR}"
          unzip -q templates.tpz -d /tmp/templates
          mv /tmp/templates/templates/* "$HOME/.local/share/godot/export_templates/${VER_DIR}/"
          echo "Export templates installed:"
          ls "$HOME/.local/share/godot/export_templates/${VER_DIR}/" | head -5

      - name: Import project resources (two passes)
        run: |
          set +e
          mkdir -p build/web
          timeout 180 godot --headless --path . --import
          timeout 60  godot --headless --path . --import
          exit 0

      - name: Export Web build
        run: |
          set -e
          godot --headless --path . --export-release "Web" build/web/index.html
          ls -la build/web/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

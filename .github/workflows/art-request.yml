name: Art Request Generator

# Handles "art-request" labeled issues for NON-FRIEND art: backgrounds,
# enemies, UI frames, props. Uses Gemini Flash text-to-image (Imagen 4
# and Stability as fallbacks).

on:
  issues:
    types: [labeled]  # NOT 'opened' — that fires for every issue, creates noise
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: art-request-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  generate:
    if: contains(github.event.issue.labels.*.name, 'art-request')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Generate art
        id: gen
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          ISSUE_BODY: |
            ${{ github.event.issue.body }}
            ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          python3 .github/scripts/process_art_request.py

      - name: Open PR + auto-merge
        if: steps.gen.outputs.asset_path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET: ${{ steps.gen.outputs.asset_path }}
          SLUG: ${{ steps.gen.outputs.slug }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="art-request/${SLUG}-$(date +%s)"
          git checkout -b "$BRANCH"
          git add "$ASSET"
          git commit -m "art: add ${SLUG} (closes #$ISSUE_NUMBER)"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "art: ${SLUG}" \
            --body "Generated via Gemini from issue #$ISSUE_NUMBER. Asset: \`$ASSET\`. Auto-merging on green CI." \
            --base main \
            --head "$BRANCH")
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$' | tail -1)
          sleep 5
          gh pr merge "$PR_NUMBER" --auto --squash || gh pr merge "$PR_NUMBER" --squash

      - name: Comment on issue
        if: steps.gen.outputs.asset_path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET: ${{ steps.gen.outputs.asset_path }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "Art generated: \`$ASSET\`. PR opened with auto-merge enabled."

name: Daily Cleanup

# Sweeps stale branches + stuck PRs. Runs daily AND on every change to
# this file (so improvements take effect immediately, not in 24h).
#
# Why not rely on `is-ancestor`: squash-merge leaves the source-branch
# SHA orphaned (not an ancestor of main) even though its content is
# fully merged. So the previous `git merge-base --is-ancestor` check
# silently missed all squash-merged branches — that's how 200+ branches
# accumulated.
#
# New rule: a branch is safe to delete if EITHER
#   (a) its tip is an ancestor of main (true merge), OR
#   (b) it has an associated PR that's closed/merged.
#
# Branch name patterns we always-clean (after PR is closed):
#   - art-request/*     (bot-generated by art-request workflow)
#   - art-tiers/*       (bot-generated by tier-art workflow)
#   - art-variants/*    (bot-generated by mass-art workflow)
#   - art-damage/*      (bot-generated by enemy-damage-art workflow)
#   - friend-photo/*    (bot-generated by photo-to-character workflow)
#   - claude/auto/*     (bot-generated by autonomous-dev loop)

on:
  schedule:
    - cron: '0 5 * * *'  # Daily at 05:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cleanup.yml'

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: cleanup
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Close stale autonomous PRs (> 3 days no updates)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          THREE_DAYS_AGO=$(date -u -d '3 days ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Closing autonomous PRs updated before $THREE_DAYS_AGO"
          gh pr list --state open --limit 100 \
            --json number,headRefName,updatedAt \
            | jq -r --arg cutoff "$THREE_DAYS_AGO" '
              .[] | select(.headRefName | startswith("claude/auto/"))
                  | select(.updatedAt < $cutoff)
                  | .number' \
            | while read -r PR; do
              if [ -n "$PR" ]; then
                echo "Closing stuck PR #$PR"
                gh pr comment "$PR" --body "Auto-closed by daily cleanup — PR idled > 3 days." || true
                gh pr close "$PR" --delete-branch || true
              fi
            done

      - name: Delete bot-pattern branches with closed PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Build a map of branch_name -> PR_state via a single API call
          gh pr list --state all --limit 500 \
            --json number,state,headRefName,merged \
            > /tmp/all_prs.json

          DELETED=0
          KEPT=0

          for BRANCH in $(git branch -r | sed 's|origin/||' | tr -d ' ' \
            | grep -E '^(art-request|art-tiers|art-variants|art-damage|friend-photo|audit-grid|claude/auto)/'); do

            # Skip protected refs
            if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "gh-pages" ]; then
              continue
            fi

            SHA=$(git rev-parse "origin/$BRANCH" 2>/dev/null || echo "")
            if [ -z "$SHA" ]; then continue; fi

            # Rule (a): truly merged into main
            IS_MERGED=false
            if git merge-base --is-ancestor "$SHA" origin/main 2>/dev/null; then
              IS_MERGED=true
            fi

            # Rule (b): has a closed PR (merged or not)
            HAS_CLOSED_PR=$(jq -r --arg b "$BRANCH" '
              [.[] | select(.headRefName == $b) | select(.state == "CLOSED" or .state == "MERGED")] | length' \
              /tmp/all_prs.json)

            # Rule (c): for art-* and friend-photo/inbox-* — content already shipped
            # (the timestamps in branch names are old; if branch is > 24h old AND no
            # open PR points at it, the content was either merged via squash or stale)
            HAS_OPEN_PR=$(jq -r --arg b "$BRANCH" '
              [.[] | select(.headRefName == $b) | select(.state == "OPEN")] | length' \
              /tmp/all_prs.json)

            BRANCH_AGE_DAYS=$(( ($(date +%s) - $(git log -1 --format=%ct "origin/$BRANCH")) / 86400 ))

            SHOULD_DELETE=false
            if [ "$IS_MERGED" = "true" ]; then
              SHOULD_DELETE=true
              REASON="ancestor-of-main"
            elif [ "$HAS_CLOSED_PR" -gt 0 ]; then
              SHOULD_DELETE=true
              REASON="closed-pr"
            elif [ "$HAS_OPEN_PR" = "0" ] && [ "$BRANCH_AGE_DAYS" -gt 1 ] && \
                 [[ "$BRANCH" =~ ^(art-request|art-tiers|art-variants|art-damage|audit-grid|friend-photo/inbox)/ ]]; then
              # Bot branches with NO open PR after 24h are abandoned — content shipped via squash
              SHOULD_DELETE=true
              REASON="abandoned-bot-branch-${BRANCH_AGE_DAYS}d"
            fi

            if [ "$SHOULD_DELETE" = "true" ]; then
              echo "DELETE $BRANCH (reason: $REASON)"
              git push origin --delete "$BRANCH" 2>&1 | tail -1 || true
              DELETED=$((DELETED + 1))
            else
              KEPT=$((KEPT + 1))
            fi
          done

          echo ""
          echo "=== Summary ==="
          echo "Deleted: $DELETED"
          echo "Kept:    $KEPT"

      - name: Delete merged feat/fix/chore/polish/hotfix author-branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          for PREFIX in fix chore feat polish hotfix docs test; do
            for BRANCH in $(git branch -r | grep "origin/$PREFIX/" | sed 's|origin/||' | tr -d ' '); do
              SHA=$(git rev-parse "origin/$BRANCH" 2>/dev/null || echo "")
              if [ -z "$SHA" ]; then continue; fi
              if git merge-base --is-ancestor "$SHA" origin/main 2>/dev/null; then
                echo "Merged $BRANCH — deleting"
                git push origin --delete "$BRANCH" 2>/dev/null || true
              fi
            done
          done

      - name: Final report
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REMAINING=$(git branch -r | wc -l)
          echo "Remaining remote branches: $REMAINING"

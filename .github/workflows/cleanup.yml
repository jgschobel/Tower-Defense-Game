name: Daily Cleanup

# Sweeps stale claude/auto/* branches and old stuck PRs. Runs daily.
# Prevents the repo from turning into a landfill when auto-merge fails
# for any reason.

on:
  schedule:
    - cron: '0 5 * * *'  # Daily at 05:00 UTC (~07:00 CEST)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: cleanup
  cancel-in-progress: false

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Close stale autonomous PRs (> 3 days no updates)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          THREE_DAYS_AGO=$(date -u -d '3 days ago' +%Y-%m-%dT%H:%M:%SZ)
          echo "Closing autonomous PRs updated before $THREE_DAYS_AGO"
          # Only touch PRs with claude/auto/* head branches — never user PRs.
          gh pr list --state open --limit 100 \
            --json number,headRefName,updatedAt \
            | jq -r --arg cutoff "$THREE_DAYS_AGO" '
              .[] | select(.headRefName | startswith("claude/auto/"))
                  | select(.updatedAt < $cutoff)
                  | .number' \
            | while read -r PR; do
              if [ -n "$PR" ]; then
                echo "Closing stuck PR #$PR"
                gh pr comment "$PR" --body "Auto-closed by daily cleanup — PR idled more than 3 days. If this work is still wanted, the autonomous loop will re-propose it." || true
                gh pr close "$PR" --delete-branch || true
              fi
            done

      - name: Delete merged claude/auto/* branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # List remote branches under claude/auto/ then check if commit is on main
          git fetch --all --prune
          for BRANCH in $(git branch -r | grep 'origin/claude/auto/' | sed 's|origin/||' | tr -d ' '); do
            LAST_SHA=$(git rev-parse "origin/$BRANCH" 2>/dev/null || echo "")
            if [ -z "$LAST_SHA" ]; then continue; fi
            if git merge-base --is-ancestor "$LAST_SHA" origin/main 2>/dev/null; then
              echo "Branch $BRANCH already merged into main — deleting"
              git push origin --delete "$BRANCH" 2>/dev/null || true
            fi
          done

      - name: Delete merged fix/* and chore/* author-branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          for PREFIX in fix chore feat; do
            for BRANCH in $(git branch -r | grep "origin/$PREFIX/" | sed 's|origin/||' | tr -d ' '); do
              LAST_SHA=$(git rev-parse "origin/$BRANCH" 2>/dev/null || echo "")
              if [ -z "$LAST_SHA" ]; then continue; fi
              if git merge-base --is-ancestor "$LAST_SHA" origin/main 2>/dev/null; then
                echo "Merged branch $BRANCH — deleting"
                git push origin --delete "$BRANCH" 2>/dev/null || true
              fi
            done
          done

      - name: Summarize cleanup in a comment on the latest cleanup issue (if any)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Cleanup run ${{ github.run_id }} finished."

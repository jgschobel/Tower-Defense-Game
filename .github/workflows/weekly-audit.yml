name: Weekly Deep Audit

# Replaces the broken drift-scan with a more comprehensive weekly audit
# that writes a dated note to docs/audits/. Catches:
#
# 1. ROADMAP drift (P0 items aging > 14 days)
# 2. Stale branches > 7 days with no PR
# 3. Asset orphans (texture files not referenced anywhere)
# 4. Open issue clusters (any label > 10 issues = backlog warning)
# 5. PR backlog if > 10 open
# 6. Workflow health (any workflow that hasn't succeeded in 7 days)

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  issues: write

concurrency:
  group: weekly-audit
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run audit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          NOW=$(date -u +%Y-%m-%d)
          OUT="docs/audits/${NOW}-weekly-audit.md"
          mkdir -p docs/audits

          {
            echo "# Weekly Deep Audit — ${NOW}"
            echo ""
            echo "_Auto-generated by \`.github/workflows/weekly-audit.yml\`._"
            echo ""

            # ROADMAP drift
            echo "## ROADMAP progress"
            DONE=$(grep -cE '^\s*-\s*\[x\]' ROADMAP.md 2>/dev/null || echo 0)
            TODO=$(grep -cE '^\s*-\s*\[ \]' ROADMAP.md 2>/dev/null || echo 0)
            TOTAL=$((DONE + TODO))
            if [ "$TOTAL" -gt 0 ]; then
              PCT=$(( DONE * 100 / TOTAL ))
            else
              PCT=0
            fi
            echo "- $DONE done / $TODO open ($PCT% complete)"
            echo ""

            # Open PR count
            echo "## PR backlog"
            PR_COUNT=$(gh pr list --state open --limit 200 --json number --jq 'length')
            echo "- Open PRs: **$PR_COUNT**"
            STALE_PRS=$(gh pr list --state open --limit 200 \
              --json number,createdAt --jq '
              [.[] | select(.createdAt | fromdateiso8601 < (now - 86400 * 7))] | length')
            echo "- Stale PRs (>7d): **$STALE_PRS**"
            echo ""

            # Branch sprawl
            echo "## Branches"
            BRANCH_COUNT=$(git branch -r 2>/dev/null | wc -l)
            echo "- Remote branches: **$BRANCH_COUNT**"
            echo ""

            # Issue clusters
            echo "## Open issue clusters"
            for LABEL in ci-failure loop-broken playtest-feedback art-request blocked stale-pr-tracker; do
              COUNT=$(gh issue list --state open --label "$LABEL" --limit 100 --json number --jq 'length')
              if [ "$COUNT" != "0" ]; then
                echo "- \`$LABEL\`: **$COUNT** open"
              fi
            done
            echo ""

            # Asset count
            echo "## Asset inventory"
            PNG_COUNT=$(find assets/textures -name '*.png' -not -name '*.import' 2>/dev/null | wc -l)
            ASSET_SIZE=$(du -sh assets/textures 2>/dev/null | cut -f1)
            echo "- Texture PNGs: $PNG_COUNT files, $ASSET_SIZE total"
            echo ""

            # Versioned (likely orphan) art
            echo "## Versioned art (likely orphan)"
            VERSIONED=$(find assets/textures -type f -name '*.png' \
              \( -name '*_raw*' -o -name '*_v2*' -o -name '*_v3*' \
                 -o -name '*_old*' -o -name '*_final*' -o -name '*_upgrade*' \
                 -o -name '*_img2img*' -o -name '*_gen*' \) 2>/dev/null | wc -l)
            echo "- Versioned files: $VERSIONED (candidates for deletion)"
            echo ""

            # Workflow health pointer
            echo "## Workflow health"
            echo "See \`docs/observability/loop-status.md\` for per-workflow status."
            echo ""

            echo "---"
            echo ""
            echo "_Filed by weekly-audit.yml. The next self-improve cron run should pick the most impactful items here. Close when addressed._"
          } > "$OUT"

          cat "$OUT"

      - name: Commit audit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          NOW=$(date -u +%Y-%m-%d)
          git add "docs/audits/${NOW}-weekly-audit.md"
          if git diff --cached --quiet; then
            echo "No new audit content"
            exit 0
          fi
          git commit -m "chore(audit): weekly deep audit ${NOW}"
          for _ in 1 2 3; do
            if git push origin main; then exit 0; fi
            sleep 5
            git pull --rebase origin main || true
          done

      - name: File audit-summary issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NOW=$(date -u +%Y-%m-%d)
          gh issue create \
            --title "[audit] Weekly deep audit ${NOW}" \
            --body "Audit committed to \`docs/audits/${NOW}-weekly-audit.md\`. Loop should pick from its findings on the next self-improve run." \
            --label "drift-scan,autonomous" || true

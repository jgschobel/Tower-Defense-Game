name: CI Failure Auto-Issue

# Watches every other workflow. When one fails, download the logs,
# extract the last 200 lines, and file a GitHub Issue so the
# in-session Claude (or next autonomous loop run) can read it via
# the GitHub MCP tools and fix the underlying bug.

on:
  workflow_run:
    workflows:
      - "Autonomous Development Loop"
      - "Deploy Web Build to GitHub Pages"
      - "Autonomous Playtester"
      - "Photo → Character Icon"
      - "Photo Inbox Processor"
      - "Art Request Generator"
      - "Daily Cleanup"
      - "Weekly Digest"
      - "Wave-Balance Simulator Gate"
      - "PR Preview Deploy"
      - "Weekly Drift Scan"
      - "Secret Scan (Gitleaks)"
      - "Deploy to Itch.io"
    types: [completed]

permissions:
  actions: read
  contents: write
  issues: write

concurrency:
  group: ci-monitor-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  on-failure:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch failed run logs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set +e
          mkdir -p logs
          # workflow_run events can fire before the logs API has the zip
          # ready — earlier impl had `(no logs available)` for 50+ entries
          # because the FIRST gh api call always returned an empty zip.
          # Retry with backoff (5s, 15s, 30s) until we get a non-empty zip
          # or give up. `gh run view --log` is also worth trying but the
          # /logs endpoint stays the most reliable for the full zip.
          for attempt in 1 2 3; do
            gh api -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/actions/runs/$RUN_ID/logs" \
              > logs.zip 2>/dev/null
            if [ -s logs.zip ] && [ "$(stat -c%s logs.zip)" -gt 100 ]; then
              echo "logs.zip is $(stat -c%s logs.zip) bytes (attempt $attempt)"
              break
            fi
            echo "logs.zip empty/small on attempt $attempt — sleeping"
            sleep $((attempt * 10 + 5))
          done
          if [ -s logs.zip ] && [ "$(stat -c%s logs.zip)" -gt 100 ]; then
            unzip -q logs.zip -d logs 2>/dev/null || echo "::warning::unzip failed, file may not be zip"
          fi
          # Concatenate all step logs, strip ANSI escapes, tail to last 250 lines
          find logs -type f -name '*.txt' -print0 \
            | xargs -0 cat 2>/dev/null \
            | sed -r 's/\x1B\[[0-9;]*[a-zA-Z]//g' \
            | tail -n 250 > log_tail.txt
          # Fallback: if nothing in zip, try `gh run view` which streams
          # the most recent logs via a different API and works post-completion.
          if [ ! -s log_tail.txt ]; then
            echo "zip path produced no logs — trying gh run view fallback"
            gh run view "$RUN_ID" --log 2>/dev/null \
              | sed -r 's/\x1B\[[0-9;]*[a-zA-Z]//g' \
              | tail -n 250 > log_tail.txt
          fi
          wc -l log_tail.txt || true
          head -c 200 log_tail.txt || true

      - name: Ensure required labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Idempotent — `gh label create --force` updates existing, no error.
          # Required because gh issue create --label fails hard if any label
          # is missing, which silently broke ci-monitor for 9+ days.
          gh label create ci-failure --color B60205 --description "Workflow run failed (filed by ci-monitor)" --force --repo "${{ github.repository }}" || true
          gh label create autonomous --color 0E8A16 --description "Files touched / created by the autonomous loop" --force --repo "${{ github.repository }}" || true
          gh label create loop-broken --color D93F0B --description "Autonomous loop or deploy is silent — needs investigation" --force --repo "${{ github.repository }}" || true

      - name: Create failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_NUM: ${{ github.event.workflow_run.run_number }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -e
          {
            echo "Workflow **${WF_NAME}** failed on branch \`${HEAD_BRANCH}\` at commit \`${HEAD_SHA:0:7}\`."
            echo ""
            echo "Run: ${RUN_URL}"
            echo ""
            echo "### Last ~250 lines of step logs"
            echo ""
            echo '```'
            if [ -s log_tail.txt ]; then
              cat log_tail.txt
            else
              echo "(no logs could be fetched — check the run URL manually)"
            fi
            echo '```'
            echo ""
            echo "---"
            echo "_Filed automatically by \`.github/workflows/ci-monitor.yml\`. Close this issue once fixed._"
          } > issue_body.md

          # Try with labels first; if that fails for any reason, fall back to
          # filing the issue WITHOUT labels so we at least surface the failure.
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "[ci-failure] ${WF_NAME} run #${RUN_NUM}" \
            --body-file issue_body.md \
            --label "ci-failure,autonomous" \
            || gh issue create \
                 --repo "${{ github.repository }}" \
                 --title "[ci-failure] ${WF_NAME} run #${RUN_NUM}" \
                 --body-file issue_body.md

      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Mirror failure log into the repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WF_NAME: ${{ github.event.workflow_run.name }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_NUM: ${{ github.event.workflow_run.run_number }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # Write the log tail as a file in the repo so future Claude
          # sessions can read it via the GitHub MCP get_file_contents tool
          # (which can read files but cannot reach Actions logs API).
          set +e
          mkdir -p docs/observability/failures
          # Sanitize workflow name for the filename
          slug=$(echo "$WF_NAME" | tr '[:upper:]' '[:lower:]' | tr ' ' '-' | tr -cd 'a-z0-9-')
          fname="docs/observability/failures/${slug}__${RUN_ID}.log"
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          {
            echo "# Workflow failure: ${WF_NAME}"
            echo "Run #${RUN_NUM} · run_id=${RUN_ID}"
            echo "URL: ${RUN_URL}"
            echo "Branch: ${HEAD_BRANCH} · Commit: ${HEAD_SHA:0:7}"
            echo "Captured: ${TS}"
            echo ""
            echo "===== last 250 lines of step logs ====="
            if [ -s ../log_tail.txt ]; then
              cat ../log_tail.txt
            elif [ -s log_tail.txt ]; then
              cat log_tail.txt
            else
              echo "(no logs available — check $RUN_URL)"
            fi
          } > "$fname"

          # Update the INDEX so a single read gives recent failures
          idx="docs/observability/failures/INDEX.md"
          if [ ! -f "$idx" ]; then
            {
              echo "# Workflow Failure Log Index"
              echo ""
              echo "Most recent failures captured by ci-monitor.yml. Each row"
              echo "links to a log file in this directory. Useful when chat-"
              echo "session Claude needs to debug \"why is X broken?\" — read"
              echo "the bottom of the log file directly via get_file_contents."
              echo ""
              echo "| When (UTC) | Workflow | Run | Branch | Commit | Log |"
              echo "|---|---|---|---|---|---|"
            } > "$idx"
          fi
          echo "| $TS | $WF_NAME | [#$RUN_NUM]($RUN_URL) | $HEAD_BRANCH | \`${HEAD_SHA:0:7}\` | [\`${slug}__${RUN_ID}.log\`](./${slug}__${RUN_ID}.log) |" >> "$idx"

          # Keep the last 50 entries (header + 50 rows + spacing)
          head -10 "$idx" > /tmp/idx.head
          tail -n +11 "$idx" | tail -50 > /tmp/idx.body
          cat /tmp/idx.head /tmp/idx.body > "$idx"

          # Trim oldest log files so the directory doesn't grow forever
          ls -1t docs/observability/failures/*.log 2>/dev/null | tail -n +51 | xargs -r rm -f

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/observability/failures/
          git diff --cached --quiet && { echo "no log changes"; exit 0; }
          git commit -m "chore(observability): log ${WF_NAME} run ${RUN_ID} (failure)"
          # Push with retry — concurrent pushes from other workflows can race
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main 2>&1 | tail -3
            if git push origin main; then
              echo "pushed on attempt $attempt"; exit 0
            fi
            sleep $((attempt * 2))
          done
          echo "::warning::failure log push failed after 5 retries"

name: Photo → Character Icon

# Triggered when an issue labeled "friend-photo" is opened.
# Extracts the attached image from the issue body, calls Stability AI
# image-to-image to turn it into a chibi cartoon tower icon, commits
# the result and opens a PR.

on:
  issues:
    types: [opened, labeled]
  # Also trigger when someone adds a photo in a comment on a labeled issue.
  # This is the easiest mobile path: the user opens a barebones issue with
  # just the label, then replies with the photo attached.
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  # Per-issue: two events (open + comment) on the same issue serialize
  # but different issues can run in parallel.
  group: photo-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  generate:
    if: contains(github.event.issue.labels.*.name, 'friend-photo')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Diagnostic — API key presence + issue body preview
        env:
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: |
            ${{ github.event.issue.body }}
            ${{ github.event.comment.body }}
        run: |
          echo "== Photo pipeline diagnostic =="
          if [ -n "$STABILITY_API_KEY" ]; then
            echo "STABILITY_API_KEY: SET (length=${#STABILITY_API_KEY})"
          else
            echo "STABILITY_API_KEY: UNSET"
          fi
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY: SET (length=${#GEMINI_API_KEY})"
          else
            echo "GEMINI_API_KEY: UNSET"
          fi
          echo "Issue body first 400 chars:"
          echo "$ISSUE_BODY" | head -c 400
          echo ""
          echo "== End diagnostic =="

      - name: Extract + generate icon
        id: gen
        env:
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Combine both — photos can live in either the original issue
          # body (template form) or a follow-up comment. Python picks
          # whichever has the image URL.
          ISSUE_BODY: |
            ${{ github.event.issue.body }}
            ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -e
          python3 .github/scripts/photo_to_character.py

      - name: Open PR with new asset
        if: steps.gen.outputs.asset_path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET: ${{ steps.gen.outputs.asset_path }}
          CHAR_NAME: ${{ steps.gen.outputs.character_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          BRANCH="friend-photo/${CHAR_NAME}-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$ASSET"
          git commit -m "art(character): add friend icon '$CHAR_NAME' (closes #$ISSUE_NUMBER)"
          git push -u origin "$BRANCH"
          gh pr create \
            --title "art(character): add friend icon '$CHAR_NAME'" \
            --body "Generated from issue #$ISSUE_NUMBER via Stability AI image-to-image.\n\nAsset: \`$ASSET\`\n\nNext: an autonomous build-content run will wire this into a new TowerData .tres and the shop." \
            --base main \
            --head "$BRANCH"

      - name: Comment on issue with result
        if: steps.gen.outputs.asset_path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHAR_NAME: ${{ steps.gen.outputs.character_name }}
          ASSET: ${{ steps.gen.outputs.asset_path }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "Icon generated for **$CHAR_NAME** and committed as \`$ASSET\`. A PR is open to merge it. Once merged, the next autonomous cron run will wire it into a new tower."

      - name: Comment on failure
        if: failure() || steps.gen.outputs.asset_path == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REASON=""
          if [ -f /tmp/photo_reason.txt ]; then
            REASON=$(cat /tmp/photo_reason.txt)
          fi
          {
            echo "⚠️ Icon generation failed for this issue."
            echo ""
            if [ -n "$REASON" ]; then
              echo "**Reason**: $REASON"
              echo ""
            fi
            echo "Workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "The CI-monitor workflow will also file a detailed ci-failure issue. The next autonomous test-validate cron will see it and attempt a fix."
          } > /tmp/fail_comment.md
          gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/fail_comment.md

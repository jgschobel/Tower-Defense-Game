name: Photo → Character Icon

# Triggered when an issue labeled "friend-photo" is opened.

on:
  issues:
    types: [labeled]  # NOT 'opened' — noisy, fires for every issue
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: photo-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  generate:
    if: contains(github.event.issue.labels.*.name, 'friend-photo')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install requests

      - name: Diagnostic — API key presence + issue body preview
        env:
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_BODY: |
            ${{ github.event.issue.body }}
            ${{ github.event.comment.body }}
        run: |
          echo "== Photo pipeline diagnostic =="
          if [ -n "$STABILITY_API_KEY" ]; then
            echo "STABILITY_API_KEY: SET (length=${#STABILITY_API_KEY})"
          else
            echo "STABILITY_API_KEY: UNSET"
          fi
          if [ -n "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY: SET (length=${#GEMINI_API_KEY})"
          else
            echo "GEMINI_API_KEY: UNSET"
          fi
          echo "Issue body first 400 chars:"
          echo "$ISSUE_BODY" | head -c 400
          echo ""
          echo "== End diagnostic =="

      - name: Extract + generate icon
        id: gen
        env:
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_BODY: |
            ${{ github.event.issue.body }}
            ${{ github.event.comment.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          set -e
          python3 .github/scripts/photo_to_character.py

      - name: Open PR + auto-merge
        if: steps.gen.outputs.asset_path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ASSET: ${{ steps.gen.outputs.asset_path }}
          CHAR_NAME: ${{ steps.gen.outputs.character_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -e
          BRANCH="friend-photo/${CHAR_NAME}-$(date +%s)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          python3 .github/scripts/make_import_files.py "$(dirname "$ASSET")" || true
          git add "$ASSET" "${ASSET}.import" 2>/dev/null || git add "$ASSET"
          git commit -m "art(character): add friend icon '$CHAR_NAME' (closes #$ISSUE_NUMBER)"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "art(character): add friend icon '$CHAR_NAME'" \
            --body "Generated from issue #$ISSUE_NUMBER via Stability AI image-to-image. Asset: \`$ASSET\`. Auto-merging on green CI." \
            --base main \
            --head "$BRANCH")
          PR_NUMBER=$(echo "$PR_URL" | grep -oE '[0-9]+$' | tail -1)
          sleep 5
          gh pr merge "$PR_NUMBER" --auto --squash || gh pr merge "$PR_NUMBER" --squash

      - name: Comment on issue with result
        if: steps.gen.outputs.asset_path != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHAR_NAME: ${{ steps.gen.outputs.character_name }}
          ASSET: ${{ steps.gen.outputs.asset_path }}
        run: |
          gh issue comment "${{ github.event.issue.number }}" \
            --body "Icon generated for **$CHAR_NAME** and committed as \`$ASSET\`. PR opened with auto-merge enabled."

      - name: Comment on failure
        if: failure() || steps.gen.outputs.asset_path == ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REASON=""
          if [ -f /tmp/photo_reason.txt ]; then
            REASON=$(cat /tmp/photo_reason.txt)
          fi
          {
            echo "⚠️ Icon generation failed for this issue."
            echo ""
            if [ -n "$REASON" ]; then
              echo "**Reason**: $REASON"
              echo ""
            fi
            echo "Workflow logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > /tmp/fail_comment.md
          gh issue comment "${{ github.event.issue.number }}" --body-file /tmp/fail_comment.md

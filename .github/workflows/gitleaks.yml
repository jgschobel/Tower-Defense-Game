name: Secret Scan (Gitleaks)

# Block any PR (especially autonomous ones) from sneaking a Stability /
# Gemini / OAuth token into the repo. Cheap defense — runs in ~10s.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: gitleaks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No license needed for public repos / personal-use scans
          GITLEAKS_ENABLE_COMMENTS: "true"

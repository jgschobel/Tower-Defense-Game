name: Weekly Digest

# Mondays at 06:00 UTC (~08:00 CEST), file a digest issue summarizing
# the week's autonomous progress AND optionally email it to the user
# with concrete feedback suggestions ("test this, weigh in on that").
#
# Email setup (one-time, from phone — 5 min):
# 1. Sign up at resend.com (free tier = 3000/mo, no credit card)
# 2. Get API key at resend.com/api-keys
# 3. Add as GitHub secret: RESEND_API_KEY
# 4. Add as GitHub secret: USER_EMAIL  (the address you want digests at)
# Without those secrets the issue is still filed; email step skips.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: weekly-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build digest body + email body
        id: build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SINCE=$(date -u -d '7 days ago' +%Y-%m-%dT00:00:00Z)
          NOW=$(date -u +%Y-%m-%d)
          PLAY_URL="https://jgschobel.github.io/Tower-Defense-Game/"

          MERGED=$(gh pr list --state merged --limit 100 \
            --search "merged:>=$SINCE" \
            --json number,title,mergedAt,author \
            | jq -r '.[] | "- #\(.number) \(.title) — @\(.author.login)"' \
            | head -40)
          if [ -z "$MERGED" ]; then MERGED="(none merged this week)"; fi
          MERGED_COUNT=$(echo "$MERGED" | grep -c '^-' || echo 0)

          OPEN_PRS=$(gh pr list --state open --limit 50 \
            --json number,title,headRefName,createdAt \
            | jq -r '.[] | "- #\(.number) `\(.headRefName)` — \(.title)"')
          if [ -z "$OPEN_PRS" ]; then OPEN_PRS="(none — clean state ✨)"; fi

          PTFB=$(gh issue list --state open --label playtest-feedback --limit 20 \
            --json number,title \
            | jq -r '.[] | "- #\(.number) \(.title)"')
          if [ -z "$PTFB" ]; then PTFB="(none — no visual issues detected)"; fi

          CIFAIL=$(gh issue list --state open --label ci-failure --limit 20 \
            --json number,title \
            | jq -r '.[] | "- #\(.number) \(.title)"')
          if [ -z "$CIFAIL" ]; then CIFAIL="(none — CI green 🎉)"; fi

          Pick 3 candidate items the user could meaningfully play-test
          this week. Anything in the "P0 just shipped" range is good.
          RECENT_TESTABLE=$(gh pr list --state merged --limit 30 \
            --search "merged:>=$SINCE label:enhancement OR feat OR polish" \
            --json title 2>/dev/null \
            | jq -r '.[] | "- " + .title' | head -5 || true)
          if [ -z "$RECENT_TESTABLE" ]; then
            RECENT_TESTABLE=$(echo "$MERGED" | head -5)
          fi

          DONE=$(grep -cE '^\s*-\s*\[x\]' ROADMAP.md || echo 0)
          TODO=$(grep -cE '^\s*-\s*\[ \]' ROADMAP.md || echo 0)

          GitHub-Issue-formatted body
          {
            echo "# Weekly Digest — $NOW"
            echo ""
            echo "## Merged PRs this week ($MERGED_COUNT)"
            echo ""
            echo "$MERGED"
            echo ""
            echo "## ROADMAP progress"
            echo ""
            echo "- $DONE items checked off"
            echo "- $TODO items remaining"
            echo ""
            echo "## Still open"
            echo ""
            echo "### Open PRs"
            echo "$OPEN_PRS"
            echo ""
            echo "### Playtest feedback"
            echo "$PTFB"
            echo ""
            echo "### CI failures"
            echo "$CIFAIL"
            echo ""
            echo "---"
            echo "_Auto-generated by \`.github/workflows/weekly-digest.yml\`. Close when read._"
          } > digest.md

          Email-friendly body with concrete asks
          {
            echo "# 🎮 Affoltern Banani Raubzug — Weekly Update ($NOW)"
            echo ""
            echo "Der autonome Loop hat diese Woche **$MERGED_COUNT PRs gemergt**, $DONE Items im ROADMAP getickt, $TODO bleibend."
            echo ""
            echo "## 🕹 Spielen + zurückmelden"
            echo ""
            echo "**Live build**: $PLAY_URL"
            echo ""
            echo "Spiel kurz (5-10 min) und gib mir Feedback zu diesen frischen Sachen:"
            echo ""
            echo "$RECENT_TESTABLE"
            echo ""
            echo "## ❓ Wo dein Input am meisten hilft"
            echo ""
            echo "**Open Playtest-Issues** (vom Vision-Agent gefunden — bestätigen oder dispute):"
            echo ""
            echo "$PTFB"
            echo ""
            echo "## 📋 Was du schnell tun könntest (vom Handy)"
            echo ""
            echo "- ROADMAP überfliegen + Prios neu setzen wenn nötig: https://github.com/jgschobel/Tower-Defense-Game/blob/main/ROADMAP.md"
            echo "- Neue Friend-Fotos hochladen via Issue-Template: https://github.com/jgschobel/Tower-Defense-Game/issues/new?template=friend-photo.yml"
            echo "- Art-Request öffnen wenn ein Map-Hintergrund / Enemy / UI dich nervt: https://github.com/jgschobel/Tower-Defense-Game/issues/new?template=art-request.yml"
            echo "- Falls was komplett broken ist: leeres Issue mit Label \`bug\` öffnen, nächster Cron picks es"
            echo ""
            echo "## 📊 Volle Liste der gemergten PRs"
            echo ""
            echo "$MERGED"
            echo ""
            echo "## 🚨 Wenn du den Loop stoppen willst"
            echo ""
            echo "Erstelle leere Datei .github/autonomous/PAUSE im Repo via GitHub mobile editor — alle Crons stoppen sofort."
            echo ""
            echo "---"
            echo "Auto-generiert. Antworte einfach auf diese Mail wenn du ein Issue draus machen willst."
          } > email.md

      - name: Create digest issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[digest] Week ending $(date -u +%Y-%m-%d)"
          gh issue create \
            --title "$TITLE" \
            --body-file digest.md \
            --label "digest"

      - name: Send email via Resend (if configured)
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
        run: |
          set -e
          if [ -z "$RESEND_API_KEY" ] || [ -z "$USER_EMAIL" ]; then
            echo "RESEND_API_KEY or USER_EMAIL not configured — skipping email send."
            echo "To enable, add both as repo secrets (see workflow header for setup)."
            exit 0
          fi

          Resend API expects HTML or text. Convert markdown body to a
          very simple HTML wrapper.
          python3 <<'PY' > email_body.json
          import json, os, re, html
          with open('email.md', 'r') as f:
              md = f.read()
          Minimal MD → HTML (headings, lists, links, code, line breaks)
          h = html.escape(md)
          Restore link syntax escaped above — undo for [text](url)
          h = re.sub(r'\[([^\]]+)\]\((https?://[^)]+)\)', r'<a href="\2">\1</a>', h)
          Headings
          h = re.sub(r'(?m)^# (.+)$', r'<h1>\1</h1>', h)
          h = re.sub(r'(?m)^## (.+)$', r'<h2>\1</h2>', h)
          h = re.sub(r'(?m)^### (.+)$', r'<h3>\1</h3>', h)
          Bold
          h = re.sub(r'\*\*([^*]+)\*\*', r'<strong>\1</strong>', h)
          Inline code
          h = re.sub(r'`([^`]+)`', r'<code>\1</code>', h)
          Lists (very basic)
          lines = []
          in_list = False
          for line in h.splitlines():
              if line.startswith('- '):
                  if not in_list:
                      lines.append('<ul>'); in_list = True
                  lines.append('<li>' + line[2:] + '</li>')
              else:
                  if in_list:
                      lines.append('</ul>'); in_list = False
                  lines.append(line + '<br>')
          if in_list:
              lines.append('</ul>')
          h = '\n'.join(lines)
          h = '<div style="font-family:system-ui,sans-serif;max-width:680px;line-height:1.5;color:#111">' + h + '</div>'

          payload = {
              "from": "Affoltern Banani Loop <onboarding@resend.dev>",
              "to": [os.environ['USER_EMAIL']],
              "subject": "🎮 Wochen-Update Affoltern Banani Raubzug",
              "html": h,
          }
          print(json.dumps(payload))
          PY

          curl -sS -X POST 'https://api.resend.com/emails' \
            -H "Authorization: Bearer $RESEND_API_KEY" \
            -H 'Content-Type: application/json' \
            -d @email_body.json \
            -o resend_response.json
          echo "Resend response:"; cat resend_response.json
          Resend returns { "id": "..." } on success
          if grep -q '"id"' resend_response.json; then
            echo "✓ Weekly digest email sent to $USER_EMAIL"
          else
            echo "⚠ Email send failed (response above). Issue still filed."
            exit 1
          fi

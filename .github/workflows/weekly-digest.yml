name: Weekly Digest

# Mondays at 06:00 UTC (~08:00 CEST), file a digest issue summarizing
# the week's autonomous progress. Gives the user a phone-friendly
# overview without scrolling through a long PR list.

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build digest
        id: build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          SINCE=$(date -u -d '7 days ago' +%Y-%m-%dT00:00:00Z)
          NOW=$(date -u +%Y-%m-%d)

          # Merged PRs in the last 7 days
          MERGED=$(gh pr list --state merged --limit 100 \
            --search "merged:>=$SINCE" \
            --json number,title,mergedAt,author \
            | jq -r '.[] | "- #\(.number) \(.title) — @\(.author.login)"' \
            | head -40)
          if [ -z "$MERGED" ]; then MERGED="(none)"; fi

          # Open PRs
          OPEN_PRS=$(gh pr list --state open --limit 50 \
            --json number,title,headRefName,createdAt \
            | jq -r '.[] | "- #\(.number) `\(.headRefName)` — \(.title)"')
          if [ -z "$OPEN_PRS" ]; then OPEN_PRS="(none — clean state ✨)"; fi

          # Open playtest-feedback issues
          PTFB=$(gh issue list --state open --label playtest-feedback --limit 20 \
            --json number,title \
            | jq -r '.[] | "- #\(.number) \(.title)"')
          if [ -z "$PTFB" ]; then PTFB="(none — no visual issues detected this week)"; fi

          # Open ci-failure issues
          CIFAIL=$(gh issue list --state open --label ci-failure --limit 20 \
            --json number,title \
            | jq -r '.[] | "- #\(.number) \(.title)"')
          if [ -z "$CIFAIL" ]; then CIFAIL="(none — CI green all week 🎉)"; fi

          # ROADMAP progress — count [x] vs [ ]
          DONE=$(grep -cE '^\s*-\s*\[x\]' ROADMAP.md || echo 0)
          TODO=$(grep -cE '^\s*-\s*\[ \]' ROADMAP.md || echo 0)

          # CHANGELOG last 7 days (rough — just tail some lines)
          CHANGELOG=$(tail -n 40 CHANGELOG.md 2>/dev/null || echo '(no changelog)')

          {
            echo "# Weekly Digest — $NOW"
            echo ""
            echo "## Merged PRs this week"
            echo ""
            echo "$MERGED"
            echo ""
            echo "## ROADMAP progress"
            echo ""
            echo "- $DONE items checked off"
            echo "- $TODO items remaining"
            echo ""
            echo "## Still open"
            echo ""
            echo "### Open PRs"
            echo "$OPEN_PRS"
            echo ""
            echo "### Playtest feedback (from auto playtester)"
            echo "$PTFB"
            echo ""
            echo "### CI failures"
            echo "$CIFAIL"
            echo ""
            echo "## Recent changelog tail"
            echo ""
            echo '```'
            echo "$CHANGELOG"
            echo '```'
            echo ""
            echo "---"
            echo "_Auto-generated by \`.github/workflows/weekly-digest.yml\`. Close when read._"
          } > digest.md
          cat digest.md

      - name: Create digest issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="[digest] Week ending $(date -u +%Y-%m-%d)"
          gh issue create \
            --title "$TITLE" \
            --body-file digest.md \
            --label "digest"

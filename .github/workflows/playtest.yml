name: Autonomous Playtester

on:
  schedule:
    # Every 6 hours (was 3h). Private repo = 2000 free GitHub Actions
    # minutes/month. Each playtest run ~6 min. At 8 cron/day + push-
    # triggered we'd burn through quota in a week. 4 cron/day is the
    # sustainable rate.
    - cron: '30 */6 * * *'
  workflow_dispatch:
  # Push-triggered: only fires on changes that could affect gameplay
  # visually. Trims out ROADMAP / docs / workflow churn from triggering
  # 6-min Godot runs. Saves ~30% of push-triggered minutes.
  push:
    branches: [main]
    paths:
      - 'scripts/towers/**'
      - 'scripts/enemies/**'
      - 'scripts/projectiles/**'
      - 'scripts/systems/**'
      - 'scripts/ui/**'
      - 'scenes/**'
      - 'resources/tower_data/**'
      - 'resources/enemy_data/**'
      - 'resources/level_data/**'
      - 'project.godot'
      - 'export_presets.cfg'
      - 'assets/textures/**'

permissions:
  contents: read
  issues: write
  id-token: write
  actions: read

concurrency:
  group: playtest
  cancel-in-progress: false

jobs:
  playtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Xvfb + audio deps + ffmpeg
        run: sudo apt-get update && sudo apt-get install -y xvfb libxcursor1 libxinerama1 libxi6 libxrandr2 ffmpeg imagemagick

      - name: Pick Godot version (single source of truth)
        id: godot
        run: |
          set -e
          PINNED=$(cat .github/godot-version.txt | tr -d '[:space:]')
          if [ -z "$PINNED" ]; then
            echo "ERROR: .github/godot-version.txt is empty"; exit 1
          fi
          if curl -fsSL --head "https://github.com/godotengine/godot/releases/download/${PINNED}/Godot_v${PINNED}_linux.x86_64.zip" > /dev/null 2>&1; then
            TAG="$PINNED"
          else
            echo "ERROR: pinned Godot version $PINNED not downloadable." >&2
            exit 1
          fi
          echo "Using Godot tag: $TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Install Godot binary
        env:
          GODOT_TAG: ${{ steps.godot.outputs.tag }}
        run: |
          set -e
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_TAG}"
          curl -fsSL -o godot.zip "${BASE}/Godot_v${GODOT_TAG}_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${GODOT_TAG}_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          godot --version

      - name: Import project resources
        run: |
          set +e
          xvfb-run -a -s "-screen 0 1280x720x24" timeout 120 godot --headless --path . --import
          xvfb-run -a -s "-screen 0 1280x720x24" timeout 60  godot --headless --path . --import
          exit 0

      - name: Run playtest bot (renders to Xvfb)
        run: |
          set +e
          # Xvfb gives us a virtual X display so Godot can actually render
          # pixels. --playtest is sniffed by AutoPlaytest autoload.
          xvfb-run -a -s "-screen 0 1280x720x24" \
            timeout 120 godot --path . --playtest
          echo "bot exit=$?"

      - name: Collect screenshots + summary + stitch GIFs
        id: collect
        run: |
          set -e
          SRC="$HOME/.local/share/godot/app_userdata/Affoltern Banani Raubzug/playtest"
          OUT="playtest_output"
          mkdir -p "$OUT"
          if [ -d "$SRC" ]; then
            cp "$SRC"/*.png "$OUT"/ 2>/dev/null || true
            cp "$SRC"/*.md "$OUT"/ 2>/dev/null || true
            cp "$SRC"/*.log "$OUT"/ 2>/dev/null || true
          fi

          # Stitch each anim_<tag>_*.png group into a GIF for animation-quality
          # review. The vision agent can't see GIFs natively, but the workflow
          # extracts a few sampled frames into the same directory so it can.
          for tag_full in $(ls "$OUT"/anim_*_000.png 2>/dev/null | sed 's|.*anim_||; s|_000\.png$||'); do
            echo "Stitching GIF: $tag_full"
            ffmpeg -y -framerate 8 -i "$OUT/anim_${tag_full}_%03d.png" \
              -vf 'fps=8,scale=640:-1:flags=lanczos' \
              "$OUT/anim_${tag_full}.gif" 2>&1 | tail -3 || true
            # Also extract 4 evenly-spaced sample frames for the vision agent
            # to inspect as PNGs (since it can't see GIFs directly)
            for frame in 000 007 015 023; do
              cp "$OUT/anim_${tag_full}_${frame}.png" \
                 "$OUT/animsample_${tag_full}_f${frame}.png" 2>/dev/null || true
            done
            # Clean up the raw frames — keep only the GIF + sample frames
            rm -f "$OUT/anim_${tag_full}"_*.png 2>/dev/null || true
          done

          COUNT=$(ls -1 "$OUT"/*.png 2>/dev/null | wc -l | tr -d ' ')
          GIFS=$(ls -1 "$OUT"/*.gif 2>/dev/null | wc -l | tr -d ' ')
          echo "Captured $COUNT PNGs, $GIFS GIFs"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          ls -la "$OUT/" | head -60 || true
          if [ -f "$OUT/summary.md" ]; then
            echo "=== playtest summary ==="
            cat "$OUT/summary.md"
          fi

      - name: Upload screenshots as workflow artifact
        if: steps.collect.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: playtest-screenshots-${{ github.run_number }}
          path: playtest_output/
          retention-days: 14

      - name: Run Claude vision analysis
        if: steps.collect.outputs.count != '0' && github.event_name != 'push'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            $(cat .github/playtest/analyze-prompt.md)

            ## Artifacts this run (playtester v3)

            Six scenarios ran:
            - **L1/L2/L3_healthy**: a sensible tower comp on each of the
              3 levels. Screenshots show menu → load → placed → wave
              progression → final.
            - **upgrades**: buys Lemurius, walks Path A tiers 1-3 then
              adds Path B tiers. Each state screenshotted — inspect
              tint shifts and overall tower look.
            - **stress**: spawns 80 enemies at once. Watch FPS in
              summary.md (< 30 = perf regression).
            - **bughunt**: rapid invalid-placement taps. Should fire
              placement toasts, no crashes or stuck ghosts.

            Files in ./playtest_output/:
            - `shot_NNN_<tag>.png` — regular snapshots (read each one)
            - `animsample_<tag>_fNNN.png` — 4 sampled frames from each
              animation clip (you can't see GIFs natively, but these
              let you inspect motion quality)
            - `anim_<tag>.gif` — the full animated clip (human-viewable
              in the workflow artifact; skip reading these, they're
              binary)
            - `summary.md` — per-scenario metrics table + interpretation
              hints. READ THIS FIRST.
            - `fps.log` — per-frame FPS samples

            File one GitHub Issue per distinct problem with label
            `playtest-feedback`. Keep it tight — 3-8 real issues, not
            20 nitpicks. Check the FPS numbers in summary.md; if the
            stress scenario is under 30 FPS, that's a P0 perf issue.

            The `gh` CLI is preconfigured with GH_TOKEN.
          claude_args: |
            --max-turns 60
            --model claude-sonnet-4-6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit observability artifact + KEY SCREENSHOTS
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          mkdir -p docs/observability/screenshots
          STATUS="ok"
          if [ "${{ job.status }}" != "success" ]; then STATUS="fail"; fi
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SHOT_COUNT=0
          if [ -d playtest_output ]; then
            SHOT_COUNT=$(ls -1 playtest_output/*.png 2>/dev/null | wc -l | tr -d ' ')
          fi

          # Copy 7 KEY screenshots into the repo so chat-session Claude can
          # Read them directly as multimodal images. Same filenames each
          # run so repo size stays bounded.
          copy_key_shot() {
            local pattern="$1"; local dest="docs/observability/screenshots/$2"
            local src
            src=$(ls playtest_output/${pattern} 2>/dev/null | head -1)
            if [ -n "$src" ]; then cp "$src" "$dest"; echo "  $dest"; fi
          }
          echo "== Copying key screenshots =="
          copy_key_shot "*00_menu*.png" "00_menu.png"
          copy_key_shot "*L1_healthy_final*.png" "L1_healthy_final.png"
          copy_key_shot "*L2_healthy_final*.png" "L2_healthy_final.png"
          copy_key_shot "*L3_healthy_final*.png" "L3_healthy_final.png"
          copy_key_shot "*upgrades_tier_A3_B2*.png" "upgrades_tier_A3_B2.png"
          copy_key_shot "*stress_t03*.png" "stress_t03.png"
          copy_key_shot "*bughunt_after_cancel*.png" "bughunt_after_cancel.png"

          {
            echo "# Playtest Latest"
            echo ""
            echo "Run: ${{ github.run_id }} @ $TS · Status: **$STATUS** · Screenshots: $SHOT_COUNT total, 7 key shots committed below"
            echo ""
            echo "## Key screenshots (Read these for visual audit)"
            echo ""
            for f in 00_menu.png L1_healthy_final.png L2_healthy_final.png L3_healthy_final.png upgrades_tier_A3_B2.png stress_t03.png bughunt_after_cancel.png; do
              if [ -f "docs/observability/screenshots/$f" ]; then
                echo "- \`docs/observability/screenshots/$f\`"
              fi
            done
            echo ""
            echo "## Summary"
            echo ""
            if [ -f playtest_output/summary.md ]; then
              cat playtest_output/summary.md
            else
              echo "(no summary.md — bot did not reach write-summary)"
            fi
            echo ""
            echo "## Full artifact"
            echo "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          } > docs/observability/playtest_latest.md

          echo "- $TS · playtest · $STATUS · run=${{ github.run_id }} · shots=$SHOT_COUNT · key=7" >> docs/observability/ledger.md
          tail -n 150 docs/observability/ledger.md > /tmp/ledger.trim
          mv /tmp/ledger.trim docs/observability/ledger.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Snapshot obs files → temp dir, fetch fresh main, overwrite, commit+push.
          # Avoids detached-HEAD confusion after git checkout main inside the run.
          SNAPSHOT_DIR=$(mktemp -d)
          mkdir -p "$SNAPSHOT_DIR/docs/observability"
          cp -r docs/observability/* "$SNAPSHOT_DIR/docs/observability/" 2>/dev/null || true

          PUSHED=0
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            git checkout -f main
            git reset --hard origin/main
            mkdir -p docs/observability/screenshots
            cp -r "$SNAPSHOT_DIR/docs/observability/"* docs/observability/
            git add docs/observability/
            if git diff --cached --quiet; then
              echo "no observability changes after reset — skip"
              PUSHED=1
              break
            fi
            git commit -m "chore(observability): playtest ${{ github.run_id }} ($STATUS)"
            if git push origin main; then
              echo "pushed on attempt $attempt"
              PUSHED=1
              break
            fi
            SLEEP=$((2 ** attempt))
            echo "push rejected — retry in ${SLEEP}s"
            sleep $SLEEP
          done
          if [ "$PUSHED" != "1" ]; then
            echo "::warning::observability commit failed after 5 retries"
          fi

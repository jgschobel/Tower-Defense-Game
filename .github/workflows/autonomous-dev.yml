name: Autonomous Development Loop

on:
  schedule:
    # Every 4 hours UTC — 6 runs per day, one per mode
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      task_mode:
        description: 'Override task mode (leave blank to auto-rotate)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - test-validate
          - audit-polish
          - ideate
          - build-content
          - self-improve
          - generate-art
      extra_instructions:
        description: 'Optional extra instructions for this run'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

concurrency:
  group: autonomous-dev
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      paused: ${{ steps.check.outputs.paused }}
      skip: ${{ steps.rate.outputs.skip }}
      mode: ${{ steps.rotate.outputs.mode }}
      model: ${{ steps.rotate.outputs.model }}
      art_enabled: ${{ steps.rotate.outputs.art_enabled }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        name: Check for PAUSE file
        run: |
          if [ -f .github/autonomous/PAUSE ]; then
            echo "Loop is paused via .github/autonomous/PAUSE — skipping run."
            echo "paused=true" >> "$GITHUB_OUTPUT"
          else
            echo "paused=false" >> "$GITHUB_OUTPUT"
          fi

      - id: rate
        name: Cron rate-limit (24h budget)
        if: steps.check.outputs.paused == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Circuit breaker: count autonomous-dev merges in the last 24h.
          # If > 8 (one per 3h, generous budget) skip — likely cron is
          # spiraling. User can tune this knob if they want more.
          DAY_AGO=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          COUNT=$(gh pr list --state merged --search "merged:>=$DAY_AGO" --limit 100 \
            --json headRefName \
            | jq '[.[] | select(.headRefName | startswith("claude/auto/"))] | length' || echo 0)
          echo "Autonomous merges in last 24h: $COUNT (budget: 8)"
          if [ "$COUNT" -gt 8 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - id: rotate
        name: Pick task mode + model
        if: steps.check.outputs.paused == 'false' && steps.rate.outputs.skip == 'false'
        env:
          STABILITY_KEY: ${{ secrets.STABILITY_API_KEY }}
        run: |
          set -e
          ART_ENABLED="false"
          if [ -n "$STABILITY_KEY" ]; then
            ART_ENABLED="true"
          fi
          echo "art_enabled=$ART_ENABLED" >> "$GITHUB_OUTPUT"

          if [ -n "${{ inputs.task_mode }}" ]; then
            MODE="${{ inputs.task_mode }}"
          else
            HOUR=$(date -u +%H)
            case "$HOUR" in
              00) MODE=test-validate ;;
              04) MODE=audit-polish ;;
              08) MODE=ideate ;;
              12) MODE=build-content ;;
              16) MODE=self-improve ;;
              20) MODE=generate-art ;;
              *)  MODE=audit-polish ;;
            esac
          fi

          if [ "$MODE" = "generate-art" ] && [ "$ART_ENABLED" != "true" ]; then
            MODE=audit-polish
          fi

          case "$MODE" in
            ideate|self-improve|build-content) MODEL=claude-opus-4-7 ;;
            *) MODEL=claude-sonnet-4-6 ;;
          esac

          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"
          echo "Selected: mode=$MODE model=$MODEL"

  run-claude:
    needs: preflight
    if: needs.preflight.outputs.paused == 'false' && needs.preflight.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build mode-specific prompt
        id: prompt
        env:
          MODE: ${{ needs.preflight.outputs.mode }}
          ART_ENABLED: ${{ needs.preflight.outputs.art_enabled }}
          EXTRA: ${{ inputs.extra_instructions }}
        run: |
          set -e
          {
            echo 'prompt<<EOF_PROMPT'
            cat .github/autonomous/base-prompt.md
            echo ''
            echo '---'
            echo ''
            echo "## THIS RUN'S MODE: $MODE"
            echo ''
            cat ".github/autonomous/mode-$MODE.md"
            echo ''
            echo '---'
            echo ''
            echo '## RECENT CHANGELOG (last 30 lines)'
            tail -n 30 CHANGELOG.md 2>/dev/null || echo '(no changelog yet)'
            echo ''
            echo "## ART GENERATION AVAILABLE: $ART_ENABLED"
            if [ -n "$EXTRA" ]; then
              echo ''
              echo '## EXTRA INSTRUCTIONS FOR THIS RUN'
              echo "$EXTRA"
            fi
            echo 'EOF_PROMPT'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prompt.outputs.prompt }}
          branch_prefix: claude/auto/
          claude_args: |
            --max-turns 300
            --model ${{ needs.preflight.outputs.model }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}

      - name: Validate and auto-merge the PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          PR_NUM=$(gh pr list --state open --json number,headRefName,createdAt --limit 30 \
            | jq -r '[.[] | select(.headRefName | startswith("claude/auto/"))] | sort_by(.createdAt) | reverse | .[0].number // empty')
          if [ -z "$PR_NUM" ]; then
            echo "No autonomous PR produced this run. Nothing to validate."
            exit 0
          fi
          echo "Validating PR #$PR_NUM"
          # Use gh pr checkout — it uses GH_TOKEN directly and avoids the
          # stale git-credential issue that breaks `git fetch origin` after
          # the Claude action runs.
          gh pr checkout "$PR_NUM"
          chmod +x .github/autonomous/validate.sh
          if .github/autonomous/validate.sh; then
            echo "Validation passed — auto-merging PR #$PR_NUM"
            gh pr merge "$PR_NUM" --squash --delete-branch
          else
            echo "Validation FAILED — closing PR #$PR_NUM"
            gh pr comment "$PR_NUM" --body "Auto-merge blocked: validation failed. Next test-validate run will investigate."
            gh pr close "$PR_NUM" --delete-branch
            gh issue create --title "Autonomous run produced broken PR (#$PR_NUM)" \
              --body "Branch failed validation. Next test-validate run should investigate." \
              --label "autonomous" || true
          fi

name: Autonomous Development Loop

on:
  schedule:
    # Every 3 hours UTC — 8 ticks per day, each tick runs 2 modes in parallel (16 PRs/day max)
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      task_mode:
        description: 'Override task mode (leave blank to auto-rotate). Only runs a single mode.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - test-validate
          - audit-polish
          - ideate
          - build-content
          - self-improve
          - generate-art
      extra_instructions:
        description: 'Optional extra instructions for this run'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      paused: ${{ steps.check.outputs.paused }}
      modes: ${{ steps.rotate.outputs.modes }}
      art_enabled: ${{ steps.rotate.outputs.art_enabled }}
    steps:
      - uses: actions/checkout@v4

      - id: check
        name: Check for PAUSE file
        run: |
          if [ -f .github/autonomous/PAUSE ]; then
            echo "Loop is paused via .github/autonomous/PAUSE — skipping run."
            echo "paused=true" >> "$GITHUB_OUTPUT"
          else
            echo "paused=false" >> "$GITHUB_OUTPUT"
          fi

      - id: rotate
        name: Pick parallel mode pair
        if: steps.check.outputs.paused == 'false'
        env:
          STABILITY_KEY: ${{ secrets.STABILITY_API_KEY }}
        run: |
          set -e
          ART_ENABLED="false"
          if [ -n "$STABILITY_KEY" ]; then
            ART_ENABLED="true"
          fi
          echo "art_enabled=$ART_ENABLED" >> "$GITHUB_OUTPUT"

          if [ -n "${{ inputs.task_mode }}" ]; then
            # Manual dispatch — run single mode
            MODES_JSON="[\"${{ inputs.task_mode }}\"]"
          else
            # Auto-rotate: 8 ticks/day, each runs 2 complementary modes in parallel
            HOUR=$(date -u +%H)
            case "$HOUR" in
              00) PAIR='["test-validate","audit-polish"]' ;;   # safety net
              03) PAIR='["ideate","build-content"]' ;;          # plan + build
              06) PAIR='["audit-polish","generate-art"]' ;;     # polish + art
              09) PAIR='["self-improve","build-content"]' ;;    # refactor + build
              12) PAIR='["ideate","generate-art"]' ;;           # plan + art
              15) PAIR='["audit-polish","build-content"]' ;;    # polish + build
              18) PAIR='["self-improve","test-validate"]' ;;    # refactor + validate
              21) PAIR='["ideate","audit-polish"]' ;;           # plan + polish
              *)  PAIR='["audit-polish","test-validate"]' ;;
            esac
            MODES_JSON="$PAIR"
          fi

          # Drop generate-art from the pair if Stability key missing
          if [ "$ART_ENABLED" != "true" ]; then
            MODES_JSON=$(echo "$MODES_JSON" | sed 's/"generate-art"/"audit-polish"/g')
          fi

          echo "modes=$MODES_JSON" >> "$GITHUB_OUTPUT"
          echo "Modes this tick: $MODES_JSON"

  run-claude:
    needs: preflight
    if: needs.preflight.outputs.paused == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        mode: ${{ fromJson(needs.preflight.outputs.modes) }}
    outputs:
      branches: ${{ toJson(matrix.mode) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pick model for this mode
        id: model
        env:
          MODE: ${{ matrix.mode }}
        run: |
          case "$MODE" in
            ideate|self-improve|build-content) MODEL=claude-opus-4-7 ;;
            audit-polish|test-validate|generate-art) MODEL=claude-sonnet-4-6 ;;
            *) MODEL=claude-sonnet-4-6 ;;
          esac
          echo "model=$MODEL" >> "$GITHUB_OUTPUT"

      - name: Build mode-specific prompt
        id: prompt
        env:
          MODE: ${{ matrix.mode }}
          ART_ENABLED: ${{ needs.preflight.outputs.art_enabled }}
          EXTRA: ${{ inputs.extra_instructions }}
        run: |
          set -e
          {
            echo 'prompt<<EOF_PROMPT'
            cat .github/autonomous/base-prompt.md
            echo ''
            echo '---'
            echo ''
            echo "## THIS RUN'S MODE: $MODE"
            echo ''
            cat ".github/autonomous/mode-$MODE.md"
            echo ''
            echo '---'
            echo ''
            echo '## RECENT CHANGELOG (last 30 lines)'
            tail -n 30 CHANGELOG.md 2>/dev/null || echo '(no changelog yet)'
            echo ''
            echo "## ART GENERATION AVAILABLE: $ART_ENABLED"
            if [ -n "$EXTRA" ]; then
              echo ''
              echo '## EXTRA INSTRUCTIONS FOR THIS RUN'
              echo "$EXTRA"
            fi
            echo 'EOF_PROMPT'
          } >> "$GITHUB_OUTPUT"

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prompt.outputs.prompt }}
          branch_prefix: claude/auto/
          claude_args: |
            --max-turns 200
            --model ${{ steps.model.outputs.model }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STABILITY_API_KEY: ${{ secrets.STABILITY_API_KEY }}

      - name: Validate and auto-merge latest PR for this mode
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODE: ${{ matrix.mode }}
        run: |
          set -e
          # Find the newest open PR on a claude/auto/<mode>-* branch
          PR_NUM=$(gh pr list --state open --json number,headRefName,createdAt --limit 30 \
            | jq -r --arg m "$MODE" '[.[] | select(.headRefName | startswith("claude/auto/" + $m))] | sort_by(.createdAt) | reverse | .[0].number // empty')
          if [ -z "$PR_NUM" ]; then
            # Fallback: any claude/auto/* PR created in the last 10 minutes
            PR_NUM=$(gh pr list --state open --json number,headRefName,createdAt --limit 30 \
              | jq -r '[.[] | select(.headRefName | startswith("claude/auto/"))] | sort_by(.createdAt) | reverse | .[0].number // empty')
          fi
          if [ -z "$PR_NUM" ]; then
            echo "No PR produced by this run (mode=$MODE). Nothing to validate."
            exit 0
          fi
          BRANCH=$(gh pr view "$PR_NUM" --json headRefName -q '.headRefName')
          echo "Validating PR #$PR_NUM on branch $BRANCH"

          # Checkout the branch and run validation
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          chmod +x .github/autonomous/validate.sh
          if .github/autonomous/validate.sh; then
            echo "Validation passed — auto-merging PR #$PR_NUM"
            gh pr merge "$PR_NUM" --squash --delete-branch --admin || \
              gh pr merge "$PR_NUM" --squash --delete-branch
          else
            echo "Validation FAILED — closing PR #$PR_NUM and filing issue"
            gh pr comment "$PR_NUM" --body "Auto-merge blocked: validation failed. The next test-validate run will investigate."
            gh pr close "$PR_NUM" --delete-branch
            gh issue create --title "Autonomous run produced broken PR (#$PR_NUM, mode=$MODE)" \
              --body "Branch $BRANCH failed validation and was auto-closed. Next test-validate run should investigate." \
              --label "autonomous" || true
          fi

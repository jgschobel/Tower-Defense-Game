name: Loop Health Watchdog

# Catches the failure mode that bit us 2026-04-21 → 2026-05-01: workflows
# silently paused, deploys never ran, user only noticed by playing a stale
# build. Runs every 6 hours independently of any other workflow. If it
# finds a "loop is silent" symptom, files an issue with label "loop-broken"
# AND opens a PR re-enabling triggers if any are detected as paused.

on:
  schedule:
    # Every 6 hours, offset by 17 min so we don't collide with the 4h
    # autonomous-dev cron at the top of the hour.
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: read

concurrency:
  group: loop-health
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Inspect workflow trigger health
        id: triggers
        run: |
          set -e
          # 1) Any workflow with a "PAUSED" comment older than 7 days?
          stale_paused=0
          stale_files=""
          for f in .github/workflows/*.yml; do
            if grep -qE "^\s*#\s*PAUSED" "$f"; then
              # Get the file's last commit date in seconds
              last=$(git log -1 --format=%ct -- "$f" 2>/dev/null || echo 0)
              now=$(date -u +%s)
              age_days=$(( (now - last) / 86400 ))
              if [ "$age_days" -gt 7 ]; then
                stale_paused=$((stale_paused + 1))
                stale_files="$stale_files\n- $f (paused $age_days days)"
              fi
            fi
          done
          {
            echo "stale_paused=$stale_paused"
            echo "stale_files<<EOF"
            echo -e "$stale_files"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          # 2) Is .github/autonomous/PAUSE present?
          pause_file="false"
          if [ -f .github/autonomous/PAUSE ]; then
            pause_file="true"
          fi
          echo "pause_file=$pause_file" >> "$GITHUB_OUTPUT"

      - name: Inspect activity recency
        id: activity
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          # Did autonomous-dev run in the last 8 hours? (cron is every 4h)
          loop_runs=$(gh api -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/autonomous-dev.yml/runs?per_page=20" \
            --jq '[.workflow_runs[] | select(.created_at > (now - 28800 | strftime("%Y-%m-%dT%H:%M:%SZ")))] | length' 2>/dev/null || echo 0)
          deploy_success=$(gh api -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/deploy-web.yml/runs?per_page=20&status=success" \
            --jq '[.workflow_runs[] | select(.created_at > (now - 86400 | strftime("%Y-%m-%dT%H:%M:%SZ")))] | length' 2>/dev/null || echo 0)
          open_failures=$(gh issue list --label ci-failure --state open --json number --jq 'length' 2>/dev/null || echo 0)
          last_deploy_sha=$(grep -oE "Commit: [a-f0-9]+" docs/observability/deploy_latest.md 2>/dev/null | head -1 | awk '{print $2}' || echo "unknown")
          {
            echo "loop_runs_8h=$loop_runs"
            echo "deploy_success_24h=$deploy_success"
            echo "open_ci_failures=$open_failures"
            echo "last_deploy_sha=$last_deploy_sha"
          } >> "$GITHUB_OUTPUT"
          # Hours since last deploy (from observability file mtime)
          if [ -f docs/observability/deploy_latest.md ]; then
            mtime=$(date -u -d "$(grep -oE '@ [0-9T:Z-]+' docs/observability/deploy_latest.md | head -1 | sed 's/@ //')" +%s 2>/dev/null || echo 0)
            now=$(date -u +%s)
            hrs=$(( (now - mtime) / 3600 ))
            echo "hours_since_deploy=$hrs" >> "$GITHUB_OUTPUT"
          else
            echo "hours_since_deploy=999" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide health verdict
        id: verdict
        env:
          STALE_PAUSED: ${{ steps.triggers.outputs.stale_paused }}
          STALE_FILES: ${{ steps.triggers.outputs.stale_files }}
          PAUSE_FILE: ${{ steps.triggers.outputs.pause_file }}
          LOOP_RUNS_8H: ${{ steps.activity.outputs.loop_runs_8h }}
          DEPLOY_24H: ${{ steps.activity.outputs.deploy_success_24h }}
          LAST_SHA: ${{ steps.activity.outputs.last_deploy_sha }}
          HOURS_SINCE: ${{ steps.activity.outputs.hours_since_deploy }}
          OPEN_FAILS: ${{ steps.activity.outputs.open_ci_failures }}
        run: |
          # Use env vars + arithmetic compound (( )) so SC2170 is happy.
          # Direct GitHub-expression interpolation in [ -gt ] confuses linters
          # because the substituted value is a string at lint time.
          set -e
          unhealthy=0
          reasons=""
          if (( STALE_PAUSED > 0 )); then
            unhealthy=1
            reasons="$reasons\n- ! ${STALE_PAUSED} workflow(s) paused >7 days:${STALE_FILES}"
          fi
          if (( LOOP_RUNS_8H == 0 )) && [ "$PAUSE_FILE" = "false" ]; then
            unhealthy=1
            reasons="$reasons\n- !! autonomous-dev hasn't run in 8h (cron is every 4h). PAUSE file absent — silent failure."
          fi
          if (( DEPLOY_24H == 0 )); then
            unhealthy=1
            reasons="$reasons\n- !! deploy-web has no successful run in last 24h. Last deploy SHA: ${LAST_SHA} (${HOURS_SINCE}h ago)."
          fi
          if (( OPEN_FAILS > 3 )); then
            unhealthy=1
            reasons="$reasons\n- ! ${OPEN_FAILS} open ci-failure issues. Backlog growing — autonomous loop not catching them."
          fi
          {
            echo "unhealthy=$unhealthy"
            echo "reasons<<EOF"
            echo -e "$reasons"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure required labels exist
        if: steps.verdict.outputs.unhealthy == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create loop-broken --color D93F0B --description "Autonomous loop is silent — investigation required" --force --repo "${{ github.repository }}" || true
          gh label create autonomous --color 0E8A16 --description "Filed by the autonomous loop" --force --repo "${{ github.repository }}" || true

      - name: File or update health issue
        if: steps.verdict.outputs.unhealthy == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          existing=$(gh issue list --label loop-broken --state open --json number --jq '.[0].number // empty')
          body=$(cat <<EOF
          # Autonomous Loop Health Check — UNHEALTHY

          Detected $(date -u +%Y-%m-%dT%H:%M:%SZ) by loop-health.yml.

          ## Symptoms
          ${{ steps.verdict.outputs.reasons }}

          ## Recent activity
          - autonomous-dev runs in last 8h: **${{ steps.activity.outputs.loop_runs_8h }}** (expected ≥1, cron is every 4h)
          - deploy-web successes in last 24h: **${{ steps.activity.outputs.deploy_success_24h }}** (expected ≥1 if any push to main)
          - Open ci-failure issues: **${{ steps.activity.outputs.open_ci_failures }}**
          - Hours since last successful deploy: **${{ steps.activity.outputs.hours_since_deploy }}**
          - PAUSE file present: \`${{ steps.triggers.outputs.pause_file }}\`

          ## What you can check
          1. Are workflow triggers paused? Run \`grep -l "# PAUSED" .github/workflows/*.yml\`
          2. Is \`.github/autonomous/PAUSE\` present and intentional?
          3. Has the CLAUDE_CODE_OAUTH_TOKEN secret expired?
          4. Are there unmerged dependabot PRs blocking workflow updates?

          Run [loop-health workflow](https://github.com/${{ github.repository }}/actions/workflows/loop-health.yml) manually after fixing.
          EOF
          )
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "$body"
            echo "Updated existing issue #$existing"
          else
            gh issue create --label loop-broken --label autonomous \
              --title "🚨 Autonomous loop is silent — needs investigation" \
              --body "$body"
            echo "Filed new loop-broken issue"
          fi

      - name: Close stale loop-broken issue if healthy
        if: steps.verdict.outputs.unhealthy == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          existing=$(gh issue list --label loop-broken --state open --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "✅ Loop now healthy as of $(date -u +%Y-%m-%dT%H:%M:%SZ). Auto-closing."
            gh issue close "$existing"
            echo "Closed resolved issue #$existing"
          fi
          echo "Loop is healthy — autonomous-dev: ${{ steps.activity.outputs.loop_runs_8h }} run(s)/8h, deploy-web: ${{ steps.activity.outputs.deploy_success_24h }} success/24h"

      - name: Build live status dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p docs/observability
          TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          status_emoji="🟢 healthy"
          if [ "${{ steps.verdict.outputs.unhealthy }}" = "1" ]; then status_emoji="🔴 unhealthy"; fi

          # Per-workflow last-run summary. One API call, parsed inline.
          render_workflow() {
            local wf="$1"
            local label="$2"
            local data
            data=$(gh api -H "Accept: application/vnd.github+json" \
              "/repos/${{ github.repository }}/actions/workflows/${wf}/runs?per_page=10" \
              --jq '.workflow_runs[] | select(.event != "workflow_dispatch" or .status == "completed") | {created_at, conclusion, status, run_number, html_url}' 2>/dev/null \
              | head -200)
            local last_run last_concl last_url last_num last_success
            last_run=$(echo "$data" | jq -r 'select(. != null) | .created_at' | head -1)
            last_concl=$(echo "$data" | jq -r 'select(. != null) | .conclusion' | head -1)
            last_url=$(echo "$data" | jq -r 'select(. != null) | .html_url' | head -1)
            last_num=$(echo "$data" | jq -r 'select(. != null) | .run_number' | head -1)
            last_success=$(echo "$data" | jq -r 'select(. != null and .conclusion == "success") | .created_at' | head -1)
            [ -z "$last_run" ] && last_run="(never)"
            [ -z "$last_concl" ] && last_concl="-"
            [ -z "$last_success" ] && last_success="(never)"
            local concl_emoji="❓"
            case "$last_concl" in
              success) concl_emoji="✅" ;;
              failure) concl_emoji="❌" ;;
              cancelled) concl_emoji="⚪" ;;
              skipped) concl_emoji="⏭️" ;;
              *) concl_emoji="❓" ;;
            esac
            if [ -n "$last_url" ] && [ "$last_url" != "(never)" ]; then
              echo "| $label | $last_run | $concl_emoji $last_concl ([#$last_num]($last_url)) | $last_success |"
            else
              echo "| $label | (never) | (never) | (never) |"
            fi
          }

          open_failures=$(gh issue list --label ci-failure --state open --json number --jq 'length' 2>/dev/null || echo 0)
          open_loop_broken=$(gh issue list --label loop-broken --state open --json number --jq 'length' 2>/dev/null || echo 0)
          pause_file="false"
          [ -f .github/autonomous/PAUSE ] && pause_file="true"

          {
            echo "# Autonomous Loop Status"
            echo ""
            echo "**Updated:** $TS"
            echo "**Overall:** $status_emoji"
            echo ""
            echo "## Workflow last-run health"
            echo ""
            echo "| Workflow | Last run (UTC) | Last status | Last success |"
            echo "|---|---|---|---|"
            render_workflow autonomous-dev.yml "autonomous-dev"
            render_workflow deploy-web.yml "deploy-web"
            render_workflow playtest.yml "playtest"
            render_workflow audit-grid.yml "audit-grid"
            render_workflow sim-gate.yml "sim-gate"
            render_workflow gitleaks.yml "gitleaks"
            render_workflow cleanup.yml "cleanup"
            render_workflow drift-scan.yml "drift-scan"
            render_workflow weekly-digest.yml "weekly-digest"
            render_workflow loop-health.yml "loop-health"
            render_workflow workflow-lint.yml "workflow-lint"
            echo ""
            echo "## Issue counters"
            echo ""
            echo "- Open \`ci-failure\` issues: **$open_failures**"
            echo "- Open \`loop-broken\` issues: **$open_loop_broken**"
            echo "- PAUSE kill-switch present: \`$pause_file\`"
            echo ""
            echo "## Recent failure logs"
            echo ""
            if [ -f docs/observability/failures/INDEX.md ]; then
              tail -10 docs/observability/failures/INDEX.md
            else
              echo "(no failure log index yet — created on first ci-monitor capture)"
            fi
            echo ""
            echo "---"
            echo "_Auto-generated by \`.github/workflows/loop-health.yml\` every 6h. Read this file for a one-shot health view._"
          } > docs/observability/loop-status.md

          # Append a one-line ledger entry
          mkdir -p docs/observability
          [ -f docs/observability/ledger.md ] || touch docs/observability/ledger.md
          echo "- $TS · loop-health · ${{ steps.verdict.outputs.unhealthy == '1' && 'UNHEALTHY' || 'ok' }} · runs8h=${{ steps.activity.outputs.loop_runs_8h }} · deploys24h=${{ steps.activity.outputs.deploy_success_24h }}" >> docs/observability/ledger.md
          tail -n 150 docs/observability/ledger.md > /tmp/ledger.trim
          mv /tmp/ledger.trim docs/observability/ledger.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/observability/loop-status.md docs/observability/ledger.md
          git diff --cached --quiet && { echo "no status changes"; exit 0; }
          git commit -m "chore(observability): loop-status update ($TS)"
          for attempt in 1 2 3 4 5; do
            git pull --rebase origin main 2>&1 | tail -3
            if git push origin main; then
              echo "pushed on attempt $attempt"; exit 0
            fi
            sleep $((attempt * 2))
          done
          echo "::warning::loop-status push failed after 5 retries"

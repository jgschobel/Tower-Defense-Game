name: PR Staleness Watchdog

# Every 12h: scans for open PRs > 48h old. Files/updates a tracking
# issue with the stale list. Prevents the silent 'PR shipped then
# forgotten' failure mode that lost 25+ art PRs in early May 2026.

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: pr-staleness-watchdog
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Find stale PRs and update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e
          gh pr list --state open --limit 100 \
            --json number,title,createdAt,mergeable,author,headRefName \
            > /tmp/all_prs.json
          python3 - <<'PYEOF'
          import json, datetime, subprocess
          with open("/tmp/all_prs.json") as f:
              prs = json.load(f)
          cutoff = datetime.datetime.utcnow() - datetime.timedelta(hours=48)
          stale = []
          for pr in prs:
              created = datetime.datetime.strptime(pr["createdAt"], "%Y-%m-%dT%H:%M:%SZ")
              if created < cutoff:
                  age_h = int((datetime.datetime.utcnow() - created).total_seconds() / 3600)
                  stale.append({
                      "number": pr["number"],
                      "title": pr["title"][:80],
                      "age_hours": age_h,
                      "mergeable": pr.get("mergeable", "UNKNOWN"),
                      "author": pr.get("author", {}).get("login", "?") if pr.get("author") else "?",
                      "branch": pr["headRefName"],
                  })
          # Find existing tracker issue
          result = subprocess.run(
              ["gh", "issue", "list", "--state", "open", "--label", "stale-pr-tracker",
               "--json", "number"],
              capture_output=True, text=True, check=True,
          )
          existing = json.loads(result.stdout)
          if not stale:
              print("No stale PRs.")
              for issue in existing:
                  subprocess.run(
                      ["gh", "issue", "close", str(issue["number"]),
                       "--comment", "All open PRs are now under 48h old. 🎉"],
                      check=True,
                  )
              exit(0)
          stale.sort(key=lambda p: -p["age_hours"])
          body = f"# {len(stale)} open PR(s) older than 48 hours\n\n"
          body += "_Auto-updated every 12h by `pr-staleness-watchdog.yml`._\n\n"
          body += "Stale PRs are likely lost work. Either merge them, close them, or rebase them.\n\n"
          body += "| PR | Age (h) | Mergeable | Author | Title |\n|---|---|---|---|---|\n"
          for s in stale:
              icon = {"MERGEABLE": "✅", "CONFLICTING": "🔴", "UNKNOWN": "❓"}.get(s["mergeable"], "❓")
              body += f"| #{s['number']} | {s['age_hours']} | {icon} {s['mergeable']} | {s['author']} | {s['title']} |\n"
          body += f"\n_Total: {len(stale)} stale PR(s)._\n"
          if existing:
              num = existing[0]["number"]
              subprocess.run(["gh", "issue", "edit", str(num), "--body", body], check=True)
              print(f"Updated tracker issue #{num}")
          else:
              subprocess.run(["gh", "issue", "create",
                              "--title", f"[stale-pr-tracker] {len(stale)} open PR(s) > 48h",
                              "--body", body,
                              "--label", "stale-pr-tracker"], check=True)
              print("Created new tracker issue")
          PYEOF

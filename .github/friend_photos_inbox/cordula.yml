description: |
  Young woman, early 20s, slim. Medium-light skin, warm-toned.
  Hair: medium brown, smooth and sleek, pulled back into a tight low
  ponytail with a few loose strands falling near the temples.
  Eyes: soft blue-grey, friendly smile showing teeth.
  Accessories: small gold hoop-style earrings, elegant look.
  Outfit: fitted black long-sleeve top with a boat/bateau neckline,
  minimal and modern.
  Vibe: poised, playful, confident, a bit mischievous — she was
  originally envisioned as a pirate-carnival tower (volleyball /
  anchor / party cannon upgrade path), keep that carnival pirate
  aesthetic: tricorn hat with feather, bandana, gold hoop earrings
  enlarged, colorful sash across the black top, holding a volleyball
  or small cannon prop.

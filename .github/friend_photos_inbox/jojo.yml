description: |
  Young man, 20s. Medium skin, warm tone.
  Hair: short curly brown hair, medium volume, slight frizz — signature
  natural curl.
  Facial hair: distinctive well-groomed horseshoe/handlebar moustache.
  Glasses: round wire-frame glasses with yellow-tinted lenses (very
  distinctive — keep this).
  Accessories: small hoop earring in one ear.
  Outfit: brown long undershirt layered under a colourful 1990s-style
  short-sleeve button-up or blazer with a geometric navy-gold-white
  pattern. Hands on hips pose, playful confident smile.
  Vibe: artsy chaos chemist, vintage-nerd, lovable eccentric — he is
  the Splash/Chaos-Chemie tower (path A = Stärcheri Formel, path B =
  Chaos-Chemie, tier-3 = Lotter JoJo). Lean into mad-scientist-chemist
  energy: holding up an erlenmeyer flask of bubbling glowing liquid,
  white lab coat OVER the patterned 90s shirt, one eyebrow raised, a
  splash of green/pink chemical mist in the air around him, the
  yellow-tinted glasses reflecting a mischievous gleam.
style: "scholar"

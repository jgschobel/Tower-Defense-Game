name: "Kühne"
text_only: true
replace_existing: true
description: |
  Young woman, early 20s. Medium skin with gentle freckles across the
  cheeks and nose.
  Hair: long, wavy, dark chestnut brown with side bangs swept across
  the forehead. A few wisps frame the face.
  Eyes: large and expressive, hazel-blue, heavy-lidded, thoughtful
  sparkle. Full lips with a slight knowing smile — a vibe that says
  "I just said something clever."
  Accessories: delicate gold chain necklace, small gold earrings.
  Outfit: dark top (charcoal / navy).
  Vibe: nature-magic, thoughtful, a little mysterious — originally
  envisioned as a flower-themed sniper with poison/ice/fire path
  (Giftige Pollen / Iis-Blüete / Füür-Lilie). Lean into that: flower
  crown of wild blossoms, hair with vines and small wildflowers
  woven in, holding a magical wand or flower staff, soft green/
  violet magical aura, nature-pixie energy.
style: "pixie"

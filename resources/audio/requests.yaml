    target_path: assets/audio/music/ai/level_1.ogg
  - id: music.level_2
    prompt: "icy ambient chiptune, cold shimmer, slow 80bpm, mysterious"
    duration: 20
    target_path: assets/audio/music/ai/level_2.ogg
  - id: music.level_3
    prompt: "warm bakery organ chiptune, cozy, medium 90bpm"
    duration: 20
    target_path: assets/audio/music/ai/level_3.ogg
  - id: music.level_4
    prompt: "dark dub cellar groove, heavy bass, 85bpm, moody"
    duration: 20
    target_path: assets/audio/music/ai/level_4.ogg
  - id: music.level_5
    prompt: "intense boss battle chiptune, driving drums, 120bpm, urgent"
    duration: 20
    target_path: assets/audio/music/ai/level_5.ogg
  - id: music.level_6
    prompt: "industrial parking garage chiptune, neon, 100bpm, gritty"
    duration: 20
    target_path: assets/audio/music/ai/level_6.ogg
  - id: music.level_7
    prompt: "cinematic rooftop finale, sweeping chiptune, 110bpm, triumphant"
    duration: 25
    target_path: assets/audio/music/ai/level_7.ogg
